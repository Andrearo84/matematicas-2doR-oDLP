<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Ayuda a Fénix!</title>
<link href="https://fonts.googleapis.com/css2?family=Chewy&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  background: #fff9ee;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse at 0% 0%, #ffe0a0 0%, transparent 55%),
    radial-gradient(ellipse at 100% 100%, #b5ecd4 0%, transparent 55%),
    radial-gradient(ellipse at 100% 0%, #ffd6f0 0%, transparent 45%),
    radial-gradient(ellipse at 0% 100%, #c5e3ff 0%, transparent 45%);
}

.cloud {
  position: fixed;
  border-radius: 50px;
  background: white;
  opacity: .55;
  pointer-events: none;
  z-index: 0;
  animation: cloudDrift var(--cd, 18s) ease-in-out infinite alternate;
}
@keyframes cloudDrift { from{transform:translateX(0)} to{transform:translateX(var(--cx,20px))} }

.ground {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 80px;
  background: linear-gradient(to top, #7ec850, #a8e06a);
  z-index: 0;
  border-radius: 60% 60% 0 0 / 30px 30px 0 0;
}
.ground::before {
  content: '🌸🌼🌷🌻🌸🌼🌷🌻🌸🌼🌷';
  position: absolute;
  top: -18px; left: 0; right: 0;
  text-align: center;
  font-size: 1.4rem;
  letter-spacing: 6px;
}

.page {
  position: relative; z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 18px 14px 100px;
  max-width: 600px;
  margin: 0 auto;
}

/* ===== HEADER ===== */
.game-header { text-align: center; margin-bottom: 6px; }
.game-title {
  font-family: 'Chewy', cursive;
  font-size: clamp(2.2rem, 8vw, 3.2rem);
  color: #e05c00;
  text-shadow: 3px 3px 0 #ffb347, 5px 5px 0 #ff8800;
  letter-spacing: 1px;
  line-height: 1;
}
.stars-row { display: flex; justify-content: center; gap: 6px; margin: 6px 0 12px; }
.star-badge { font-size: 1.8rem; transition: all .3s; filter: grayscale(1) opacity(.3); }
.star-badge.lit { filter: none; animation: starPop .4s cubic-bezier(.175,.885,.32,1.275); }
@keyframes starPop { 0%{transform:scale(0) rotate(-30deg)} 70%{transform:scale(1.3) rotate(5deg)} 100%{transform:scale(1) rotate(0)} }

/* ===== LEVEL SELECT SCREEN ===== */
#levelScreen {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}

.level-intro {
  background: white;
  border-radius: 28px;
  padding: 20px;
  width: 100%;
  box-shadow: 0 8px 0 #e0d0c0, 0 12px 30px #00000018;
  border: 3px solid #ffd080;
  text-align: center;
}
.level-fox { font-size: 5rem; animation: foxWiggle 2.5s ease-in-out infinite; display: block; }
@keyframes foxWiggle { 0%,100%{transform:rotate(-5deg) translateY(0)} 50%{transform:rotate(5deg) translateY(-6px)} }
.level-intro-text {
  font-family: 'Chewy', cursive;
  font-size: 1.4rem;
  color: #4a3000;
  margin-top: 10px;
  line-height: 1.4;
}
.level-intro-sub { font-size: .95rem; font-weight: 700; color: #888; margin-top: 6px; }

.level-title {
  font-family: 'Chewy', cursive;
  font-size: 1.3rem;
  color: #4a3000;
}

.level-btn {
  width: 100%;
  border: none;
  border-radius: 22px;
  padding: 18px 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 16px;
  transition: all .18s;
  box-shadow: 0 6px 0 rgba(0,0,0,.15), 0 8px 20px rgba(0,0,0,.1);
  text-align: left;
}
.level-btn:hover { transform: translateY(-3px); }
.level-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,.15); }

.level-btn.easy { background: linear-gradient(135deg, #fff3b0, #ffe066); border: 3px solid #ffc940; }
.level-btn.mid  { background: linear-gradient(135deg, #b8f0d0, #66ddaa); border: 3px solid #30bb80; }
.level-btn.hard { background: linear-gradient(135deg, #f0b8d0, #dd6688); border: 3px solid #cc3366; }

.level-btn-emoji { font-size: 3rem; flex-shrink: 0; }
.level-btn-info {}
.level-btn-name {
  font-family: 'Chewy', cursive;
  font-size: 1.5rem;
  color: #333;
  line-height: 1;
}
.level-btn-desc { font-size: .85rem; font-weight: 700; color: #555; margin-top: 3px; }

/* ===== GAME SCREEN ===== */
#gameScreen { width: 100%; display: none; flex-direction: column; align-items: center; }
#gameScreen.visible { display: flex; }

.level-badge {
  font-family: 'Chewy', cursive;
  font-size: 1rem;
  padding: 4px 16px;
  border-radius: 50px;
  margin-bottom: 8px;
  border: 2px solid;
}
.level-badge.easy { background: #fff3b0; border-color: #ffc940; color: #7a5800; }
.level-badge.mid  { background: #b8f0d0; border-color: #30bb80; color: #0a5c30; }
.level-badge.hard { background: #f0b8d0; border-color: #cc3366; color: #7a0030; }

.progress-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 14px; }
.dot { width: 12px; height: 12px; border-radius: 50%; background: #ddd; transition: all .3s; }
.dot.done   { background: #e05c00; transform: scale(1.2); }
.dot.active { background: #ffc940; transform: scale(1.3); box-shadow: 0 0 0 3px #ffc94044; }

/* ===== SCENE CARD ===== */
.scene-card {
  background: white;
  border-radius: 28px;
  padding: 22px 20px 20px;
  width: 100%;
  box-shadow: 0 8px 0 #e0d0c0, 0 12px 30px #00000018;
  border: 3px solid #ffd080;
  margin-bottom: 16px;
}
.fox-scene { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 18px; }
.fox-big { font-size: 5rem; line-height: 1; flex-shrink: 0; animation: foxWiggle 2.5s ease-in-out infinite; user-select: none; }

.bubble {
  background: #fffae0;
  border: 2.5px solid #ffc940;
  border-radius: 18px 18px 18px 4px;
  padding: 12px 16px;
  font-size: clamp(.95rem, 3vw, 1.1rem);
  font-weight: 900;
  color: #4a3000;
  line-height: 1.5;
  flex: 1;
  position: relative;
  box-shadow: 0 3px 0 #ffc94055;
}
.bubble::before { content:''; position:absolute; left:-13px; bottom:12px; border:7px solid transparent; border-right-color:#ffc940; }
.bubble::after  { content:''; position:absolute; left:-9px;  bottom:13px; border:6px solid transparent; border-right-color:#fffae0; }
.bubble .num { color: #e05c00; font-family:'Chewy',cursive; font-size:1.3em; }
.bubble .grn { color: #1a8c3e; font-family:'Chewy',cursive; font-size:1.3em; }

.objects-area {
  background: linear-gradient(135deg, #e8f8ff, #d0f0e0);
  border-radius: 20px;
  padding: 14px;
  min-height: 70px;
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  align-items: center;
  justify-content: center;
  border: 2px dashed #80ccaa;
  position: relative;
}
.objects-label {
  position: absolute;
  top: -11px; left: 16px;
  background: white;
  border: 2px solid #80ccaa;
  border-radius: 20px;
  padding: 1px 10px;
  font-size: .75rem;
  font-weight: 900;
  color: #1a8c3e;
}
.objects-area2 { background: linear-gradient(135deg, #fff0f8, #ffe8f0); border-color: #f0a0c0; margin-top: 10px; }
.objects-area2 .objects-label { border-color: #f0a0c0; color: #c0306a; }

.obj {
  font-size: clamp(1.4rem, 5vw, 2rem);
  animation: objPop .4s cubic-bezier(.175,.885,.32,1.275) both;
  transition: transform .2s, opacity .3s;
  line-height: 1;
  cursor: default;
}
.obj.removed { opacity: .12; transform: scale(.4) rotate(20deg); pointer-events: none; }
@keyframes objPop { from{opacity:0;transform:scale(0) rotate(-20deg)} to{opacity:1;transform:scale(1) rotate(0)} }

/* ===== STEP PANELS ===== */
.step-panel {
  background: white;
  border-radius: 22px;
  padding: 18px 16px;
  width: 100%;
  box-shadow: 0 6px 0 #ddd, 0 10px 24px #00000012;
  border: 2.5px solid #c8e0ff;
  margin-bottom: 14px;
  display: none;
}
.step-panel.visible { display: block; animation: panelSlide .4s ease both; }
@keyframes panelSlide { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

.step-title {
  font-family: 'Chewy', cursive;
  font-size: 1.25rem;
  color: #2255cc;
  margin-bottom: 12px;
}

/* Answer buttons */
.answer-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
.op-grid     { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

.ans-btn {
  font-family: 'Chewy', cursive;
  font-size: 1.6rem;
  padding: 12px 6px;
  border-radius: 16px;
  border: 3px solid #c8e0ff;
  background: #f0f6ff;
  color: #2255cc;
  cursor: pointer;
  transition: all .15s;
  box-shadow: 0 4px 0 #a0c0ee;
  -webkit-tap-highlight-color: transparent;
}
.ans-btn:hover  { background: #d8eaff; transform: translateY(-2px); }
.ans-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #a0c0ee; }
.ans-btn.op-btn { font-size: 1.2rem; padding: 14px 24px; }
.ans-btn.correct { background: #d0ffdf; border-color: #40cc70; color: #1a8c3e; box-shadow: 0 4px 0 #30a050; animation: correctBounce .4s ease; pointer-events: none; }
.ans-btn.wrong   { background: #ffd8d8; border-color: #e05050; color: #c02020; animation: wrongShake .4s ease; }
@keyframes correctBounce { 0%{transform:scale(1)} 40%{transform:scale(1.15)} 100%{transform:scale(1)} }
@keyframes wrongShake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* Next button */
.next-btn {
  font-family: 'Chewy', cursive;
  font-size: 1.5rem;
  padding: 14px 36px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #ff9f40, #e05c00);
  color: white;
  cursor: pointer;
  box-shadow: 0 6px 0 #aa3800;
  transition: all .15s;
  display: none;
  margin: 4px auto 0;
  text-shadow: 0 1px 3px #00000033;
  -webkit-tap-highlight-color: transparent;
}
.next-btn:hover  { transform: translateY(-3px); box-shadow: 0 9px 0 #aa3800; }
.next-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #aa3800; }
.next-btn.show   { display: block; animation: btnAppear .4s cubic-bezier(.175,.885,.32,1.275) both; }
@keyframes btnAppear { from{opacity:0;transform:scale(.7)} to{opacity:1;transform:scale(1)} }

/* Celebration */
.celebration { display: none; text-align: center; padding: 10px 0; width: 100%; }
.celebration.show { display: block; animation: panelSlide .5s ease; }
.celeb-card {
  background: white;
  border-radius: 28px;
  padding: 24px 20px;
  box-shadow: 0 8px 0 #e0d0c0;
  border: 3px solid #ffd080;
  margin-bottom: 12px;
}
.celeb-emoji { font-size: 4rem; animation: celebSpin 1s ease-in-out infinite alternate; display: block; }
@keyframes celebSpin { from{transform:scale(1) rotate(-10deg)} to{transform:scale(1.15) rotate(10deg)} }
.celeb-text { font-family:'Chewy',cursive; font-size:1.8rem; color:#e05c00; text-shadow:2px 2px 0 #ffd080; margin:8px 0 4px; }
.celeb-sub  { font-size:.95rem; font-weight:700; color:#555; line-height:1.5; }

.action-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 14px; }

.new-story-btn {
  font-family: 'Chewy', cursive;
  font-size: 1.2rem;
  padding: 12px 28px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #40cc70, #1a8c3e);
  color: white;
  cursor: pointer;
  box-shadow: 0 5px 0 #0f5c28;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.new-story-btn:hover { transform: translateY(-2px); }

.change-level-btn {
  font-family: 'Chewy', cursive;
  font-size: 1.2rem;
  padding: 12px 28px;
  border-radius: 50px;
  border: none;
  background: linear-gradient(135deg, #ffcc40, #e09000);
  color: white;
  cursor: pointer;
  box-shadow: 0 5px 0 #8a5500;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
}
.change-level-btn:hover { transform: translateY(-2px); }

/* Confetti */
.cp { position:fixed; pointer-events:none; z-index:999; font-size:1.4rem; animation:cpFall var(--d,1.2s) ease-in forwards; }
@keyframes cpFall { 0%{opacity:1;transform:translateY(0) rotate(0) translateX(0)} 100%{opacity:0;transform:translateY(90vh) rotate(var(--r,540deg)) translateX(var(--x,60px))} }
</style>
</head>
<body>

<div class="cloud" style="width:120px;height:40px;top:6%;left:5%;--cd:20s;--cx:30px"></div>
<div class="cloud" style="width:80px;height:28px;top:12%;left:60%;--cd:15s;--cx:-20px"></div>
<div class="cloud" style="width:100px;height:35px;top:4%;left:35%;--cd:25s;--cx:18px"></div>
<div class="ground"></div>

<div class="page">

  <!-- HEADER -->
  <div class="game-header">
    <div class="game-title">🦊 ¡Ayuda a Fénix!</div>
    <div class="stars-row">
      <div class="star-badge" id="s1">⭐</div>
      <div class="star-badge" id="s2">⭐</div>
      <div class="star-badge" id="s3">⭐</div>
      <div class="star-badge" id="s4">⭐</div>
      <div class="star-badge" id="s5">⭐</div>
    </div>
  </div>

  <!-- ===== LEVEL SELECT ===== -->
  <div id="levelScreen">
    <div class="level-intro">
      <span class="level-fox">🦊</span>
      <div class="level-intro-text">¡Hola! Soy Fénix el zorro y necesito tu ayuda con las matemáticas! 🧮</div>
      <div class="level-intro-sub">Elige un nivel para empezar</div>
    </div>

    <div class="level-title">¿Qué nivel quieres jugar?</div>

    <button class="level-btn easy" id="btnEasy">
      <div class="level-btn-emoji">⭐</div>
      <div class="level-btn-info">
        <div class="level-btn-name">Fácil</div>
        <div class="level-btn-desc">Números del 1 al 10 · Suma y resta</div>
      </div>
    </button>

    <button class="level-btn mid" id="btnMid">
      <div class="level-btn-emoji">⭐⭐</div>
      <div class="level-btn-info">
        <div class="level-btn-name">Medio</div>
        <div class="level-btn-desc">Números del 1 al 20 · Suma y resta</div>
      </div>
    </button>

    <button class="level-btn hard" id="btnHard">
      <div class="level-btn-emoji">⭐⭐⭐</div>
      <div class="level-btn-info">
        <div class="level-btn-name">Difícil</div>
        <div class="level-btn-desc">Números del 1 al 50 · Suma y resta</div>
      </div>
    </button>
  </div>

  <!-- ===== GAME SCREEN ===== -->
  <div id="gameScreen">

    <div class="level-badge" id="levelBadge">⭐ Fácil</div>
    <div class="progress-dots" id="progressDots"></div>

    <!-- Scene -->
    <div class="scene-card">
      <div class="fox-scene">
        <div class="fox-big" id="foxEmoji">🦊</div>
        <div class="bubble" id="storyBubble">…</div>
      </div>
      <div class="objects-area" id="objAreaA">
        <div class="objects-label" id="objLabelA">Los de Fénix</div>
        <div id="objsA" style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center"></div>
      </div>
      <div class="objects-area objects-area2" id="objAreaB" style="display:none;margin-top:10px">
        <div class="objects-label" id="objLabelB">Los nuevos</div>
        <div id="objsB" style="display:flex;flex-wrap:wrap;gap:5px;justify-content:center"></div>
      </div>
    </div>

    <!-- Step 1: operation -->
    <div class="step-panel" id="step1">
      <div class="step-title" id="step1Title">👆 ¿Fénix suma o resta?</div>
      <div class="op-grid">
        <button class="ans-btn op-btn" id="btnSum">➕ Suma</button>
        <button class="ans-btn op-btn" id="btnSub">➖ Resta</button>
      </div>
    </div>

    <!-- Step 2: count A -->
    <div class="step-panel" id="step2">
      <div class="step-title" id="step2Title">🔢 ¿Cuántos hay?</div>
      <div class="answer-grid" id="gridA"></div>
    </div>

    <!-- Step 3: count B (sum only) -->
    <div class="step-panel" id="step3">
      <div class="step-title" id="step3Title">🔢 ¿Y en este grupo?</div>
      <div class="answer-grid" id="gridB"></div>
    </div>

    <!-- Step 4: final -->
    <div class="step-panel" id="step4">
      <div class="step-title" id="step4Title">🎯 ¿Cuántos hay ahora?</div>
      <div class="answer-grid" id="gridFinal"></div>
    </div>

    <button class="next-btn" id="nextBtn">¡Siguiente! →</button>

    <!-- Celebration -->
    <div class="celebration" id="celebration">
      <div class="celeb-card">
        <span class="celeb-emoji" id="celebEmoji">🎉</span>
        <div class="celeb-text" id="celebText">¡Lo conseguiste!</div>
        <div class="celeb-sub" id="celebSub"></div>
      </div>
      <div class="action-btns">
        <button class="new-story-btn" id="newStoryBtn">🌟 ¡Nueva aventura!</button>
        <button class="change-level-btn" id="changeLevelBtn">🔄 Cambiar nivel</button>
      </div>
    </div>

  </div><!-- end gameScreen -->

</div>

<script>
// ===== STORIES =====
const STORIES = [
  { mode:'sum', emoji:'🍎', labelA:'Manzanas de Fénix', labelB:'Manzanas nuevas',
    line:(a,b)=>`Tengo <span class="num">${a}</span> manzanas 🍎 y encuentro <span class="num">${b}</span> más. ¿Cuántas tengo ahora?`,
    end:(r)=>`¡Fénix tiene <span class="grn">${r}</span> manzanas! 🍎` },
  { mode:'sub', emoji:'🐟', labelA:'Peces de Fénix', labelB:'',
    line:(a,b)=>`Pesqué <span class="num">${a}</span> peces 🐟 pero se escaparon <span class="num">${b}</span>. ¿Cuántos me quedan?`,
    end:(r)=>`¡Le quedan <span class="grn">${r}</span> peces! 🐟` },
  { mode:'sum', emoji:'⭐', labelA:'Estrellas de Fénix', labelB:'Estrellas nuevas',
    line:(a,b)=>`Tengo <span class="num">${a}</span> estrellas ⭐ y encuentro <span class="num">${b}</span> más en el bosque. ¿Cuántas tengo?`,
    end:(r)=>`¡Fénix tiene <span class="grn">${r}</span> estrellas! ⭐` },
  { mode:'sub', emoji:'🍪', labelA:'Galletas de Fénix', labelB:'',
    line:(a,b)=>`Hice <span class="num">${a}</span> galletas 🍪 y me comí <span class="num">${b}</span>. ¿Cuántas quedan?`,
    end:(r)=>`¡Quedan <span class="grn">${r}</span> galletas! 🍪` },
  { mode:'sum', emoji:'🦋', labelA:'Mariposas aquí', labelB:'Mariposas que llegan',
    line:(a,b)=>`Veo <span class="num">${a}</span> mariposas 🦋 y llegan <span class="num">${b}</span> más. ¿Cuántas hay?`,
    end:(r)=>`¡Hay <span class="grn">${r}</span> mariposas! 🦋` },
  { mode:'sub', emoji:'🎈', labelA:'Globos de Fénix', labelB:'',
    line:(a,b)=>`Tengo <span class="num">${a}</span> globos 🎈 y se vuelan <span class="num">${b}</span>. ¿Cuántos me quedan?`,
    end:(r)=>`¡Le quedan <span class="grn">${r}</span> globos! 🎈` },
  { mode:'sum', emoji:'🍓', labelA:'Fresas de Fénix', labelB:'Fresas del amigo',
    line:(a,b)=>`Tengo <span class="num">${a}</span> fresas 🍓 y mi amigo me da <span class="num">${b}</span>. ¿Cuántas tengo?`,
    end:(r)=>`¡Fénix tiene <span class="grn">${r}</span> fresas! 🍓` },
  { mode:'sub', emoji:'🌸', labelA:'Flores de Fénix', labelB:'',
    line:(a,b)=>`Recogí <span class="num">${a}</span> flores 🌸 y regalé <span class="num">${b}</span>. ¿Cuántas me quedan?`,
    end:(r)=>`¡Le quedan <span class="grn">${r}</span> flores! 🌸` },
  { mode:'sum', emoji:'🐣', labelA:'Pollitos aquí', labelB:'Pollitos nuevos',
    line:(a,b)=>`Hay <span class="num">${a}</span> pollitos 🐣 y nacen <span class="num">${b}</span> más. ¿Cuántos hay?`,
    end:(r)=>`¡Hay <span class="grn">${r}</span> pollitos! 🐣` },
  { mode:'sub', emoji:'🍬', labelA:'Caramelos de Fénix', labelB:'',
    line:(a,b)=>`Tengo <span class="num">${a}</span> caramelos 🍬 y comparto <span class="num">${b}</span>. ¿Cuántos me quedan?`,
    end:(r)=>`¡Le quedan <span class="grn">${r}</span> caramelos! 🍬` },
];

const CELEBRATIONS = [
  { emoji:'🎉', text:'¡Lo conseguiste!' },
  { emoji:'🏆', text:'¡Eres genial!' },
  { emoji:'🌟', text:'¡Perfecto!' },
  { emoji:'🎊', text:'¡Increíble!' },
  { emoji:'🥇', text:'¡Campeón!' },
];

// ===== STATE =====
let curLevel = 'easy'; // easy | mid | hard
let storyOrder = [], storyIdx = 0;
let curA, curB, curResult, curStory;
let phase = 0;
let stars = 0, wrongUsed = false;

const LEVELS = {
  easy: { max: 10, label: '⭐ Fácil',   cls: 'easy' },
  mid:  { max: 20, label: '⭐⭐ Medio',  cls: 'mid'  },
  hard: { max: 50, label: '⭐⭐⭐ Difícil', cls: 'hard' },
};

function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function rand(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

// ===== LEVEL SELECT =====
document.getElementById('btnEasy').addEventListener('click', () => startGame('easy'));
document.getElementById('btnMid').addEventListener('click',  () => startGame('mid'));
document.getElementById('btnHard').addEventListener('click', () => startGame('hard'));
document.getElementById('newStoryBtn').addEventListener('click', newStory);
document.getElementById('changeLevelBtn').addEventListener('click', showLevelScreen);
document.getElementById('nextBtn').addEventListener('click', advance);

function showLevelScreen() {
  document.getElementById('levelScreen').style.display = 'flex';
  document.getElementById('gameScreen').classList.remove('visible');
}

function startGame(level) {
  curLevel = level;
  storyOrder = shuffle([...Array(STORIES.length).keys()]);
  storyIdx = 0;

  // Badge
  const badge = document.getElementById('levelBadge');
  badge.textContent = LEVELS[level].label;
  badge.className = 'level-badge ' + LEVELS[level].cls;

  document.getElementById('levelScreen').style.display = 'none';
  document.getElementById('gameScreen').classList.add('visible');
  newStory();
}

// ===== NEW STORY =====
function newStory() {
  if (storyIdx >= storyOrder.length) {
    storyOrder = shuffle([...Array(STORIES.length).keys()]);
    storyIdx = 0;
  }
  curStory = STORIES[storyOrder[storyIdx++]];
  wrongUsed = false;

  const max = LEVELS[curLevel].max;

  if (curStory.mode === 'sum') {
    curA = rand(1, Math.floor(max * 0.6));
    curB = rand(1, Math.min(Math.floor(max * 0.4), max - curA));
    curResult = curA + curB;
  } else {
    curA = rand(Math.ceil(max * 0.3), max);
    curB = rand(1, curA - 1);
    curResult = curA - curB;
  }

  // Story bubble
  document.getElementById('storyBubble').innerHTML = curStory.line(curA, curB);
  document.getElementById('foxEmoji').textContent = '🦊';

  // Objects A
  renderObjs('objsA', curA, curStory.emoji, 0);
  document.getElementById('objLabelA').textContent = curStory.labelA;

  // Objects B
  const areaB = document.getElementById('objAreaB');
  if (curStory.mode === 'sum') {
    areaB.style.display = 'flex';
    renderObjs('objsB', curB, curStory.emoji, curA * 0.05);
    document.getElementById('objLabelB').textContent = curStory.labelB;
  } else {
    areaB.style.display = 'none';
  }

  // Progress dots
  renderDots();

  // Reset
  phase = 0;
  ['step1','step2','step3','step4'].forEach(id => document.getElementById(id).classList.remove('visible'));
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('celebration').classList.remove('show');

  // Reset op buttons
  document.getElementById('btnSum').className = 'ans-btn op-btn';
  document.getElementById('btnSub').className = 'ans-btn op-btn';

  setTimeout(() => document.getElementById('step1').classList.add('visible'), 300);
}

function renderObjs(id, count, emoji, baseDelay) {
  const c = document.getElementById(id);
  c.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = 'obj';
    d.textContent = emoji;
    d.style.animationDelay = (baseDelay + i * 0.06) + 's';
    c.appendChild(d);
  }
}

function renderDots() {
  const dots = document.getElementById('progressDots');
  dots.innerHTML = '';
  const done = storyIdx - 1;
  for (let i = 0; i < STORIES.length; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < done ? ' done' : i === done ? ' active' : '');
    dots.appendChild(d);
  }
}

// ===== STEP 1: OPERATION =====
document.getElementById('btnSum').addEventListener('click', function() { pickOp('sum', this); });
document.getElementById('btnSub').addEventListener('click', function() { pickOp('sub', this); });

function pickOp(chosen, btn) {
  if (chosen === curStory.mode) {
    btn.className = 'ans-btn op-btn correct';
    document.getElementById('btnSum').onclick = null;
    document.getElementById('btnSub').onclick = null;
    setTimeout(() => showStep2(), 700);
  } else {
    wrongUsed = true;
    btn.className = 'ans-btn op-btn wrong';
    setTimeout(() => { btn.className = 'ans-btn op-btn'; }, 500);
  }
}

// ===== STEP 2: COUNT A =====
function showStep2() {
  phase = 1;
  document.getElementById('step2Title').textContent =
    `🔢 ¿Cuántos ${curStory.emoji} tiene Fénix?`;
  document.getElementById('step2').classList.add('visible');
  makeGrid('gridA', curA, 1, LEVELS[curLevel].max, () => {
    highlightObjs('objsA');
    setTimeout(() => {
      document.getElementById('nextBtn').textContent =
        curStory.mode === 'sum' ? '¡Siguiente! →' : '¡Ya podemos restar! →';
      document.getElementById('nextBtn').classList.add('show');
    }, 500);
  });
}

// ===== NEXT =====
function advance() {
  document.getElementById('nextBtn').classList.remove('show');
  if (curStory.mode === 'sum' && phase === 1) {
    showStep3();
  } else {
    showStep4();
  }
}

// ===== STEP 3: COUNT B =====
function showStep3() {
  phase = 2;
  document.getElementById('step3Title').textContent =
    `🔢 ¿Cuántos ${curStory.emoji} hay en el otro grupo?`;
  document.getElementById('step3').classList.add('visible');
  makeGrid('gridB', curB, 1, LEVELS[curLevel].max, () => {
    highlightObjs('objsB');
    setTimeout(() => {
      document.getElementById('nextBtn').textContent = '¡Ya podemos sumar! →';
      document.getElementById('nextBtn').classList.add('show');
    }, 500);
  });
}

// ===== STEP 4: FINAL =====
function showStep4() {
  phase = 3;
  document.getElementById('step4Title').textContent =
    curStory.mode === 'sum'
      ? `🎯 ¿Cuántos ${curStory.emoji} tiene Fénix en total?`
      : `🎯 ¿Cuántos ${curStory.emoji} le quedan a Fénix?`;
  document.getElementById('step4').classList.add('visible');

  if (curStory.mode === 'sub') animateRemove('objsA', curB);

  makeGrid('gridFinal', curResult, 0, LEVELS[curLevel].max + 10, () => {
    setTimeout(() => celebrate(), 600);
  });
}

// ===== GRID HELPER =====
function makeGrid(containerId, correct, minV, maxV, onCorrect) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = '';
  const opts = new Set([correct]);
  let tries = 0;
  while (opts.size < 4 && tries < 100) {
    const off = rand(1, Math.min(4, Math.floor((maxV - minV) / 2) || 4));
    const sign = Math.random() < .5 ? 1 : -1;
    const v = correct + off * sign;
    if (v >= minV && v <= maxV + 5) opts.add(v);
    tries++;
  }
  // Fallback if not enough options
  while (opts.size < 4) opts.add(correct + opts.size);

  shuffle([...opts]).forEach(v => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = v;
    btn.addEventListener('click', function() {
      if (v === correct) {
        grid.querySelectorAll('.ans-btn').forEach(b => { b.onclick = null; b.style.pointerEvents = 'none'; });
        btn.className = 'ans-btn correct';
        onCorrect();
      } else {
        wrongUsed = true;
        btn.className = 'ans-btn wrong';
        setTimeout(() => { btn.className = 'ans-btn'; }, 500);
      }
    });
    grid.appendChild(btn);
  });
}

function highlightObjs(id) {
  [...document.querySelectorAll(`#${id} .obj`)].forEach((o, i) => {
    setTimeout(() => {
      o.style.transform = 'scale(1.3)';
      setTimeout(() => { o.style.transform = ''; }, 200);
    }, i * 60);
  });
}

function animateRemove(id, count) {
  const objs = [...document.querySelectorAll(`#${id} .obj`)];
  objs.slice(objs.length - count).forEach((o, i) => {
    setTimeout(() => o.classList.add('removed'), 200 + i * 80);
  });
}

// ===== CELEBRATE =====
function celebrate() {
  if (!wrongUsed) {
    stars = Math.min(5, stars + 1);
    for (let i = 1; i <= stars; i++) document.getElementById('s' + i).classList.add('lit');
  }
  const c = CELEBRATIONS[Math.floor(Math.random() * CELEBRATIONS.length)];
  document.getElementById('celebEmoji').textContent = c.emoji;
  document.getElementById('celebText').textContent = c.text;
  document.getElementById('celebSub').innerHTML = curStory.end(curResult);
  document.getElementById('storyBubble').innerHTML =
    `¡Muy bien! ¡La respuesta es <span class="grn">${curResult}</span>! ¡Eres un campeón! 🏆`;
  document.getElementById('celebration').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const em = ['🎉','⭐','🌟','🎊','❤️','🦊','🍀','🎈'];
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'cp';
    el.textContent = em[Math.floor(Math.random() * em.length)];
    el.style.cssText = `left:${rand(5,95)}vw;top:${rand(5,40)}vh;--d:${(.7+Math.random()*1.3).toFixed(2)}s;--r:${rand(200,720)}deg;--x:${(Math.random()-.5)*180}px;animation-delay:${(Math.random()*.4).toFixed(2)}s;`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2200);
  }
}
</script>
</body>
